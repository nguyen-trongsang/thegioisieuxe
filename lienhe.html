<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />

    <title>Liên Hệ</title>

    <style>
      .oswald {
        font-family: "Oswald", sans-serif;
        font-optical-sizing: auto;
        font-weight: 200;
        font-style: normal;
      }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        color: white;
        background-color: black;
      }

      header {
        text-align: center;
        z-index: 1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
      }

      .menu a {
        float: left;
        display: block;
        color: white;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
        transition: 0.3s ease-in-out;
      }

      .menu a:hover {
        transform: translateY(-3px);
        background-color: white;
        color: #111;
      }

      .contact {
        max-width: 1000px;
        margin: 50px auto;
        padding: 20px;
        text-align: center;
      }

      .contact h1 {
        font-size: 40px;
        color: crimson;
      }

      .contact-info {
        margin: 30px 0;
        font-size: 18px;
        line-height: 1.8;
      }

      .contact-form {
        background: #111;
        padding: 20px;
        border-radius: 15px;
        text-align: left;
      }

      .contact-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: bold;
      }

      .contact-form input,
      .contact-form textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: none;
      }

      .contact-form button {
        background: crimson;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        transition: 0.3s ease-in-out;
      }

      .contact-form button:hover {
        background: white;
        color: #111;
      }

      footer {
        background: black;
        text-align: center;
        padding: 15px;
        margin-top: 50px;
        position: fixed;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>

  <body>
    <header>
      <h1 class="oswald">Thế Giới Siêu Xe</h1>
      <div class="menu">
        <a href="index.html">Trang chủ</a>
        <a href="gioithieu.html">Giới thiệu</a>
        <a href="dichvu.html">Dịch vụ</a>
        <a href="lienhe.html">Liên hệ</a>
      </div>
    </header>

    <div class="contact">
      <h1 class="oswald">Liên Hệ</h1>
      <h3 class="oswald">
        Hãy liên hệ với chúng tôi để được tư vấn và hỗ trợ nhanh chóng.
      </h3>

      <div class="contact-info">
        <p><strong>Địa chỉ:</strong> xxx Đường Siêu Xe, Quận x, TP.HCM</p>
        <p>
          <strong>Điện thoại:</strong>
          <p>sdt:xxxxxxx789</p>
        </p>
        <p><strong>Email:</strong> thegioisieuxe@sieuxe.com</p>
      </div>

      <div class="contact-form">
        <form>
          <label for="name">Họ và tên</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Nhập họ tên..."
          />

          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Nhập email..."
          />

          <label for="message">Nội dung</label>
          <textarea
            id="message"
            name="message"
            rows="5"
            placeholder="Nhập nội dung..."
          ></textarea>

          <button type="submit">Gửi Liên Hệ</button>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Trang Liên Hệ Siêu Xe</p>
    </footer>
  </body>
</html>
